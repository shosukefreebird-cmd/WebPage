<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Open City Prototype</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" width="1280" height="720" aria-label="オープンワールド風ゲーム"></canvas>

      <section class="hud" aria-label="ゲーム情報">
        <div>
          <span class="eyebrow">Open City</span>
          <strong>街を自由に探索</strong>
        </div>
        <div class="stats">
          <span id="speed">0 km/h</span>
          <span id="area">Downtown</span>
          <span id="cash">$250</span>
        </div>
      </section>

      <aside class="panel">
        <h1>自由行動プロトタイプ</h1>
        <p>WASD / 矢印キーで移動。Shiftでダッシュ。黄色い目的地に入ると報酬が入ります。</p>
        <div class="keys" aria-label="操作方法">
          <span>W</span><span>A</span><span>S</span><span>D</span>
          <span>Shift</span>
        </div>
      </aside>

      <canvas id="miniMap" width="180" height="180" aria-label="ミニマップ"></canvas>
    </main>

    <script src="game.js"></script>
  </body>
</html>
